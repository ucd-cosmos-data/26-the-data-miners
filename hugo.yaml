baseURL: https://ucd-cosmos-data.github.io/26-the-data-miners/
locale: en-us
title: "The Data Miners"
theme: ["PaperMod"]

params:
  defaultTheme: dark
  disableThemeToggle: true
  description: "A COSMOS team site for student data stories, mini-projects, logs, and field notes."
  assets:
    favicon: bonsai.jpeg #the small icon shown in the browser tab
    theme_color: "#07111f"
  ShowToc: false
  socialIcons:
    - name: github
      url: "https://github.com/ucd-cosmos-data/26-the-data-miners"
  math: True
  profileMode:
    enabled: true
    title: "The Data Miners"
    imageUrl: "/26-the-data-miners/diamond-pickaxe-retro.png"
    imageWidth: 360
    imageHeight: 360

menu:
  main:
    - identifier: Members
      name: Members
      url: /members/
      weight: 10
    - identifier: Project
      name: Project
      url: /project/
      weight: 20
    - identifier: mini-projects
      name: Mini Projects
      url: /mini-projects/
      weight: 30
    - identifier: Logs
      name: Logs
      url: /logs/
      weight: 40
    - identifier: Photos
      name: Photos
      url: /photos/
      weight: 50
    - identifier: course-site
      name: Course Website
      url: https://ucd-cosmos-data.github.io/

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
          - - $$
            - $$
        enable: true
